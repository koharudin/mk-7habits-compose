services:
  nginx:
    image: nginx:latest
    restart: always
    networks:
      - internal
    ports:
      - "2027:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - be
      - fe
    extra_hosts:
      - "api.local:host-gateway"

  postgres:
    image: postgres:16
    networks:
      - internal
    restart: always
    ports:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_7habits
    volumes:
      - ./docker-dev-volumes/postgres_data:/var/lib/postgresql/data
    extra_hosts:
      - "api.local:host-gateway"
  be:
    restart: always
    networks:
      - internal
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./be:/var/www
      - ./be/public:/var/www/html
    ports:
      - 92:80
    tty: true
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=db_7habits
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - LOG_CHANNEL=stderr
      - LOG_STACK=single
      - LOG_DEPRECATIONS_CHANNEL=null
      - LOG_LEVEL=debug
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=127.0.0.1
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - APP_KEY=base64:deI0PtRyyd+1nhnFdJDOqsNsxxDdMr2FvM8ouaJ9TcQ=
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_TIMEZONE=UTC
      - APP_URL=http://localhost
      - PASSPORT_PERSONAL_ACCESS_CLIENT_ID=a1db0fd6-61d1-4577-925b-ee2401ae35b0
      - PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET=UOYINeZRKquYTiESqD2AovSYLNeFUEeQwdUwcDTw
      - APP_LOCALE=en
      - APP_FALLBACK_LOCALE=en
      - APP_FAKER_LOCALE=en_US

      - APP_MAINTENANCE_DRIVER=file

      - PHP_CLI_SERVER_WORKERS=4

      - BCRYPT_ROUNDS=12
    extra_hosts:
      - "api.local:host-gateway"
  fe:
    restart: always
    networks:
      - internal
    build:
      context: ./fe/full-version
      dockerfile: fe.Dockerfile
    volumes:
      - ./fe/full-version:/app
    ports:
      - 93:3000
    environment:
      - API_URL=https://7habits.mediakolaborasi.com/backend/api
      - NEXT_PUBLIC_APP_URL=https://7habits.mediakolaborasi.com
      - NEXTAUTH_URL=https://7habits.mediakolaborasi.com
      - NEXTAUTH_SECRET=/83vTMRaUYJObtDcbEa0AqhNXJ2gGVyNkol1nugIFi0=
    extra_hosts:
      - "api.local:host-gateway"
    tty: true
    command: >
      sh -c "
        if [ ! -d node_modules ]; then
          npm install;
        fi &&
        npm run dev"
networks:
  monitoring:
    external: true
  internal:
    driver: bridge